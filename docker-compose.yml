services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_control_plane
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    ports:
      - "8010:8010"
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql+psycopg://agent:agent@postgres:5432/agent_control_plane
      LOG_LEVEL: INFO
  worker:
    build: .
    depends_on:
      - postgres
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql+psycopg://agent:agent@postgres:5432/agent_control_plane
      LOG_LEVEL: INFO
    command: ["sh", "-c", "alembic upgrade head && agent-control-plane-worker"]

volumes:
  postgres-data:
